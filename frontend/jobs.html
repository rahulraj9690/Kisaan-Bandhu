<!doctype html>
<html>

<head>

<title>Available Farm Jobs</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<section class="jobs-section">

<h1>Available Farm Jobs</h1>

<p class="subtitle">Find nearby farm work and apply easily</p>

<div class="jobs-container">

<div class="job-card">

<img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854">

<div class="job-info">

<h3>Wheat Harvest</h3>

<p><i class="fa-solid fa-location-dot"></i> Village: Mainpuri</p>

<p><i class="fa-solid fa-users"></i> Workers Needed: 8</p>

<button class="apply-btn">Apply</button>

</div>

</div>


<div class="job-card">

<img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef">

<div class="job-info">

<h3>Field Cutting</h3>

<p><i class="fa-solid fa-location-dot"></i> Village: Etawah</p>

<p><i class="fa-solid fa-users"></i> Workers Needed: 5</p>

<button class="apply-btn">Apply</button>

</div>

</div>

</div>

<form id="labourForm">
  <input type="text" id="farmerName" placeholder="Farmer Name" required>
  <input type="text" id="workType" placeholder="Work Type" required>
  <input type="text" id="location" placeholder="Location" required>
  <input type="number" id="workersNeeded" placeholder="Workers Needed" required>
  <button type="submit">Submit</button>
</form>

</section>

</body>

</html>
