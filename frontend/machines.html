<!DOCTYPE html>
<html>

<head>

<title>Farm Machines for Rent</title>

<link rel="stylesheet" href="css/machines.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<section class="machines-section">

<h1>Farm Machines for Rent</h1>

<p class="subtitle">Rent modern farming equipment easily</p>

<div class="machines-container">


<div class="machine-card">

<img src="tractor.jpg">

<div class="machine-info">

<h3>Tractor</h3>

<p><i class="fa-solid fa-location-dot"></i> Location: Mainpuri</p>

<p><i class="fa-solid fa-money-bill"></i> Rent: ₹500/hour</p>

<p><i class="fa-solid fa-star"></i> Rating: 4.6</p>

<button class="book-btn">Book Now</button>

</div>

</div>


<div class="machine-card">

<img src="rotavator.jpg">

<div class="machine-info">

<h3>Rotavator</h3>

<p><i class="fa-solid fa-location-dot"></i> Location: Etawah</p>

<p><i class="fa-solid fa-money-bill"></i> Rent: ₹300/hour</p>

<p><i class="fa-solid fa-star"></i> Rating: 4.4</p>

<button class="book-btn">Book Now</button>

</div>

</div>


<div class="machine-card">

<img src="harvester.jpg">

<div class="machine-info">

<h3>Harvester</h3>

<p><i class="fa-solid fa-location-dot"></i> Location: Ghaziabad</p>

<p><i class="fa-solid fa-money-bill"></i> Rent: ₹900/hour</p>

<p><i class="fa-solid fa-star"></i> Rating: 4.8</p>

<button class="book-btn">Book Now</button>

</div>

</div>


</div>

</section>
