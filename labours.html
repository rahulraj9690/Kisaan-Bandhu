<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Available Farm Labours</title>

<style>

body{
font-family:Poppins, sans-serif;
background:#f4f9f4;
margin:0;
padding:40px;
}

.page-title{
text-align:center;
font-size:36px;
color:#2e7d32;
margin-bottom:30px;
}

.search-box{
display:block;
margin:0 auto 40px;
padding:12px;
width:300px;
border-radius:8px;
border:1px solid #ccc;
}

.labour-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.labour-card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.labour-card:hover{
transform:translateY(-6px);
box-shadow:0 15px 25px rgba(0,0,0,0.2);
}

.labour-card img{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:10px;
}

.rating{
color:#ff9800;
margin:10px 0;
}

.btn{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
}

.call-btn{
background:#2e7d32;
color:white;
}

.whatsapp-btn{
background:#25D366;
color:white;
}

</style>

</head>

<body>

<h1 class="page-title">Available Farm Labours</h1>

<input type="text" id="search" class="search-box" placeholder="Search labour name...">

<div class="labour-container" id="labourContainer">

<div class="labour-card" data-name="Ramesh Kumar" data-area="Mainpuri">

<img src="https://i.pravatar.cc/150?img=12">

<h3>Ramesh Kumar</h3>

<p>Experience: 5 Years</p>

<p>Location: Mainpuri</p>

<div class="rating">⭐⭐⭐⭐☆</div>

<button class="btn call-btn" onclick="callLabour('9876543210')">Call</button>

<a class="btn whatsapp-btn" href="https://wa.me/919876543210">WhatsApp</a>

</div>

<div class="labour-card" data-name="Suresh" data-area="Etawah">

<img src="https://i.pravatar.cc/150?img=18">

<h3>Suresh</h3>

<p>Experience: 3 Years</p>

<p>Location: Etawah</p>

<div class="rating">⭐⭐⭐⭐</div>

<button class="btn call-btn" onclick="callLabour('9876543211')">Call</button>

<a class="btn whatsapp-btn" href="https://wa.me/919876543211">WhatsApp</a>

</div>

<div class="labour-card" data-name="Mohan" data-area="Ghaziabad">

<img src="https://i.pravatar.cc/150?img=22">

<h3>Mohan</h3>

<p>Experience: 6 Years</p>

<p>Location: Ghaziabad</p>

<div class="rating">⭐⭐⭐⭐⭐</div>

<button class="btn call-btn" onclick="callLabour('9876543212')">Call</button>

<a class="btn whatsapp-btn" href="https://wa.me/919876543212">WhatsApp</a>

</div>

</div>

<script>

function callLabour(number){
window.location.href="tel:"+number;
}


let search=document.getElementById("search");

search.addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let cards=document.querySelectorAll(".labour-card");

cards.forEach(card=>{

let name=card.getAttribute("data-name").toLowerCase();

if(name.includes(value)){
card.style.display="block";
}else{
card.style.display="none";
}

});

});


// AREA FILTER FROM URL

const params=new URLSearchParams(window.location.search);

const area=params.get("area");

if(area){

document.querySelectorAll(".labour-card").forEach(card=>{

if(card.getAttribute("data-area")!==area){
card.style.display="none";
}

});

}

</script>

</body>

</html>
